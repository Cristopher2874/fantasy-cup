oci:
  configFile: $OCI_CONFIG_FILE|~/.oci/config  
  profile: $OCI_PROFILE|DEFAULT               
  compartment: $OCI_COMPARTMENT_OCID|ocid1.compartment.oc1..aaaaaaaaxj6fuodcmai6n6z5yyqif6a36ewfmmovn42red37ml3wxlehjmga
  project: $OCI_PROJECT|ocid1.generativeaiproject.oc1.us-chicago-1.amaaaaaaghwivzaaweu6y7r5yms24upipxxrhyfw6hqllhqpzc5756f5bmtq
  api_key: $OCI_AI_API_KEY|not-used

oci_openai:
  default_endpoint: https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/openai/v1

game:
  default_league_id: "1"
  default_season: "2022"

codex_runner:
  command: codex
  sandbox: read-only
  timeout_seconds: 300
  enable_search: false

api_football:
  min_interval_seconds: 7.0
  rate_limit_retries: 5
  rate_limit_sleep_seconds: 20.0

scoring:
  initial_team_points: 0
