oci:
  configFile: $OCI_CONFIG_FILE|~/.oci/config  
  profile: $OCI_PROFILE|DEFAULT               
  compartment: $OCI_COMPARTMENT_OCID|ocid1.compartment.oc1..aaaaaaaaxj6fuodcmai6n6z5yyqif6a36ewfmmovn42red37ml3wxlehjmga
  project: $OCI_PROJECT|ocid1.generativeaiproject.oc1.us-chicago-1.amaaaaaaghwivzaaweu6y7r5yms24upipxxrhyfw6hqllhqpzc5756f5bmtq
  api_key: $OCI_AI_API_KEY|not-used

oci_openai:
  default_endpoint: https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/openai/v1

game:
  default_league_id: "1"
  default_season: "2022"

codex_runner:
#  command: /usr/local/bin/codex
  command: codex
  sandbox: read-only
  timeout_seconds: 300
  enable_search: true
  skip_git_repo_check: true
  log_output_chars: 4000

api_football:
  min_interval_seconds: 7.0
  rate_limit_retries: 5
  rate_limit_sleep_seconds: 20.0

scoring:
  initial_team_points: 0

admin_routes:
  # Protects only POST /scores/{job_id}/score. Automatic pipeline scoring does
  # not use this route and is not affected.
  score_write_requires_token: true
  score_write_header: x-admin-token
  score_write_token: $INNO_FANTASY_ADMIN_TOKEN|

server:
  # Leave empty when the reverse proxy strips any external prefix before
  # forwarding to this backend. Set to "/api" only when ASGI root_path support
  # is needed by the deployment.
  root_path: ""
  # Keep empty for same-origin reverse-proxy deployments. Add exact UI origins
  # when the UI calls the backend cross-origin during integration.
  cors_allowed_origins: []
  cors_allow_credentials: false
  trusted_hosts:
    - "*"

rate_limit:
  enabled: true
  # Trust X-Forwarded-For only when the backend is reachable only through your
  # reverse proxy. If the backend is directly public, set this to false.
  trust_proxy_headers: true
  client_ip_header: x-forwarded-for
  default:
    requests: 30
    window_seconds: 60
  rules:
    - name: upload
      methods: [POST]
      path: /upload
      match: exact
      requests: 3
      window_seconds: 60
    - name: progress
      methods: [GET]
      path: /progress
      match: prefix
      requests: 120
      window_seconds: 60
    - name: public-data
      methods: [GET]
      path: /public-data
      match: prefix
      requests: 120
      window_seconds: 60
    - name: score-read
      methods: [GET]
      path: /scores
      match: prefix
      requests: 60
      window_seconds: 60
    - name: score-write
      methods: [POST]
      path: /scores
      match: prefix
      requests: 5
      window_seconds: 60
